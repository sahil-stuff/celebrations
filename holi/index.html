<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 💖</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:'Poppins',sans-serif;
color:white;
}

/* Romantic Text */
#overlayText{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:90%;
text-align:center;
font-size:clamp(1.3rem,4vw,2.2rem);
z-index:10;
transition:0.5s;
}

/* Surprise Button */
#proposalBtn{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff0080,#ff8c00);
color:white;
cursor:pointer;
z-index:10;
}

/* Modal */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:black;
padding:30px;
border-radius:20px;
text-align:center;
z-index:20;
transition:0.4s ease;
width:85%;
max-width:400px;
}
.modal.active{
transform:translate(-50%,-50%) scale(1);
}
.modal button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

#yesBtn{background:#28a745;color:white;}
#noBtn{background:#dc3545;color:white;position:relative;}
#secretBtn{
background:#ff0080;
color:white;
display:none;
}
</style>
</head>

<body>

<div id="overlayText">
🌸 This Holi, I don't want just colors... <br>
I want YOU to color my life forever 💖✨
</div>

<button id="proposalBtn">Click for a Surprise 🎁</button>

<div class="modal" id="proposalModal">
<h2 id="modalText">Will you play Holi with me? 🌈💖</h2>
<button id="yesBtn">Yes 😍</button>
<button id="noBtn">No 😜</button>
<button id="secretBtn">Something Important 💌</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ---------------- SOUND ---------------- */

const fahSound = new Audio();
fahSound.src = "fahhhhh.mp3";
fahSound.preload = "auto";
fahSound.volume = 1.0;

function playFah(){
    fahSound.currentTime = 0;
    fahSound.play().catch(e => console.log("Playback blocked:", e));
}

/* ---------------- THREE BACKGROUND ---------------- */

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=5;

const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.domElement.style.position="fixed";
renderer.domElement.style.top="0";
renderer.domElement.style.left="0";
document.body.appendChild(renderer.domElement);

const particlesCount=2000;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(particlesCount*3);
const colors=new Float32Array(particlesCount*3);

for(let i=0;i<particlesCount*3;i++){
positions[i]=(Math.random()-0.5)*20;
colors[i]=Math.random();
}

geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
geometry.setAttribute('color',new THREE.BufferAttribute(colors,3));

const material=new THREE.PointsMaterial({size:0.1,vertexColors:true});
const particles=new THREE.Points(geometry,material);
scene.add(particles);

function animate(){
requestAnimationFrame(animate);
particles.rotation.y+=0.0015;
particles.rotation.x+=0.001;
renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

/* ---------------- EXPLOSION ---------------- */

function createColorExplosion(){

const explosionCount=3000;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(explosionCount*3);
const colors=new Float32Array(explosionCount*3);

for(let i=0;i<explosionCount*3;i+=3){
positions[i]=0;
positions[i+1]=0;
positions[i+2]=0;
const color=new THREE.Color();
color.setHSL(Math.random(),1,0.5);
colors[i]=color.r;
colors[i+1]=color.g;
colors[i+2]=color.b;
}

geometry.setAttribute("position",new THREE.BufferAttribute(positions,3));
geometry.setAttribute("color",new THREE.BufferAttribute(colors,3));

const material=new THREE.PointsMaterial({size:0.15,vertexColors:true});
const explosion=new THREE.Points(geometry,material);
scene.add(explosion);

const velocity=[];
for(let i=0;i<explosionCount;i++){
velocity.push({
x:(Math.random()-0.5)*0.4,
y:(Math.random()-0.5)*0.4,
z:(Math.random()-0.5)*0.4
});
}

function explode(){
const pos=explosion.geometry.attributes.position.array;
for(let i=0;i<explosionCount;i++){
pos[i*3]+=velocity[i].x;
pos[i*3+1]+=velocity[i].y;
pos[i*3+2]+=velocity[i].z;
}
explosion.geometry.attributes.position.needsUpdate=true;
requestAnimationFrame(explode);
}
explode();
}

/* ---------------- MODAL LOGIC ---------------- */

const modal=document.getElementById("proposalModal");
const modalText=document.getElementById("modalText");
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const secretBtn=document.getElementById("secretBtn");

document.getElementById("proposalBtn").onclick=()=>{
modal.classList.add("active");
};

yesBtn.onclick=()=>{
playFah();
createColorExplosion();

modalText.innerHTML="Yayyyyy!! 🌈💖<br>You just made this Holi magical! ✨";
yesBtn.style.display="none";
noBtn.style.display="none";

secretBtn.style.display="inline-block";  // show secret button
};

noBtn.onclick=()=>{
modalText.innerText="Nice try 😜 but destiny says YES!";
};

/* ---------------- SECRET ASK OUT ---------------- */

secretBtn.onclick=()=>{
playFah();
createColorExplosion();

modalText.innerHTML="💖 Now that you said YES to Holi... <br><br> Will you go on a cute date with me too? 🌸✨";

secretBtn.style.display="none";
};

</script>

</body>
</html>
