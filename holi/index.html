<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Holi Celebration 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
}

#overlayText {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 2rem;
    z-index: 10;
    animation: fadeIn 3s ease-in-out;
}

#proposalBtn {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff0080, #ff8c00);
    color: white;
    cursor: pointer;
    z-index: 10;
    transition: 0.3s;
}
#proposalBtn:hover {
    transform: translateX(-50%) scale(1.1);
}

.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: black;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    z-index: 20;
    transition: 0.4s ease;
}

.modal.active {
    transform: translate(-50%, -50%) scale(1);
}

.modal button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: relative;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<div id="overlayText">
    🌸 This Holi, I don't want just colors... <br>
    I want YOU to color my life forever 💖✨
</div>

<button id="proposalBtn">Click for a Surprise 🎁</button>

<div class="modal" id="proposalModal">
    <h2>Will you play Holi with me? 🌈💖</h2>
    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😜</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

// Particles
const particlesCount = 2000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particlesCount * 3);
const colors = new Float32Array(particlesCount * 3);

for (let i = 0; i < particlesCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 20;
    colors[i] = Math.random();
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({
    size: 0.1,
    vertexColors: true
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

// Animation
function animate() {
    requestAnimationFrame(animate);
    particles.rotation.y += 0.002;
    particles.rotation.x += 0.001;
    renderer.render(scene, camera);
}
animate();

// Modal Logic
const modal = document.getElementById("proposalModal");
const proposalBtn = document.getElementById("proposalBtn");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

proposalBtn.onclick = () => {
    modal.classList.add("active");
};

yesBtn.onclick = () => {
    modal.innerHTML = "<h2>Yayyy!! 💖🌈<br>Get ready for the most colorful Holi ever with me! 🎉</h2>";
    particles.rotation.y += 0.05;
};

const funnyMessages = [
    "Are you sure? 😏",
    "Think again... I have colors ready 🎨",
    "You can't escape this Holi 😜",
    "Last chance! 😆",
    "Okay fine... but I'm still coming! 😂"
];

let noClickCount = 0;

noBtn.onclick = () => {
    if (noClickCount < funnyMessages.length) {
        modal.querySelector("h2").innerText = funnyMessages[noClickCount];
        noClickCount++;
    } else {
        noBtn.style.position = "absolute";
        noBtn.style.top = Math.random() * 200 + "px";
        noBtn.style.left = Math.random() * 200 + "px";
    }
};

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
