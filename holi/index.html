<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 💖</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:'Poppins',sans-serif;
color:white;
}

/* Background Text */
#overlayText{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:90%;
text-align:center;
font-size:clamp(1.3rem,4vw,2.2rem);
z-index:10;
transition:0.5s;
}

/* Surprise Button */
#proposalBtn{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff0080,#ff8c00);
color:white;
cursor:pointer;
z-index:10;
}

/* Modal */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:black;
padding:30px;
border-radius:20px;
text-align:center;
z-index:20;
transition:0.4s ease;
width:85%;
max-width:400px;
}
.modal.active{
transform:translate(-50%,-50%) scale(1);
}
.modal button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}
#yesBtn,#dateYesBtn{background:#28a745;color:white;}
#noBtn,#dateNoBtn{background:#dc3545;color:white;position:relative;}
#secretBtn{background:#ff0080;color:white;display:none;}
</style>
</head>

<body>

<div id="overlayText">
🌸 This Holi, I don't want just colors... <br>
I want YOU to color my life forever 💖✨
</div>

<button id="proposalBtn">Click for a Surprise 🎁</button>

<div class="modal" id="proposalModal">
<h2 id="modalText">Will you play Holi with me? 🌈💖</h2>
<button id="yesBtn">Yes 😍</button>
<button id="noBtn">No 😜</button>
<button id="secretBtn">Something Important 💌</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ---------------- SOUND ---------------- */
const fahSound = new Audio("fahhhhh.mp3");
function playFah(){
fahSound.currentTime=0;
fahSound.play().catch(()=>{});
}

/* ---------------- THREE BACKGROUND ---------------- */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=5;

const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.domElement.style.position="fixed";
renderer.domElement.style.top="0";
renderer.domElement.style.left="0";
document.body.appendChild(renderer.domElement);

const particlesCount=2000;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(particlesCount*3);
const colors=new Float32Array(particlesCount*3);

for(let i=0;i<particlesCount*3;i++){
positions[i]=(Math.random()-0.5)*20;
colors[i]=Math.random();
}

geometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
geometry.setAttribute('color',new THREE.BufferAttribute(colors,3));

const material=new THREE.PointsMaterial({size:0.1,vertexColors:true});
const particles=new THREE.Points(geometry,material);
scene.add(particles);

function animate(){
requestAnimationFrame(animate);
particles.rotation.y+=0.0015;
particles.rotation.x+=0.001;
renderer.render(scene,camera);
}
animate();

/* ---------------- EXPLOSIONS ---------------- */

function createColorExplosion(){
const count=2000;
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);
const col=new Float32Array(count*3);

for(let i=0;i<count*3;i+=3){
pos[i]=0;pos[i+1]=0;pos[i+2]=0;
const c=new THREE.Color();
c.setHSL(Math.random(),1,0.5);
col[i]=c.r;col[i+1]=c.g;col[i+2]=c.b;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
geo.setAttribute("color",new THREE.BufferAttribute(col,3));

const mat=new THREE.PointsMaterial({size:0.15,vertexColors:true});
const exp=new THREE.Points(geo,mat);
scene.add(exp);

const velocity=[];
for(let i=0;i<count;i++){
velocity.push({x:(Math.random()-0.5)*0.4,y:(Math.random()-0.5)*0.4,z:(Math.random()-0.5)*0.4});
}

function explode(){
const arr=exp.geometry.attributes.position.array;
for(let i=0;i<count;i++){
arr[i*3]+=velocity[i].x;
arr[i*3+1]+=velocity[i].y;
arr[i*3+2]+=velocity[i].z;
}
exp.geometry.attributes.position.needsUpdate=true;
requestAnimationFrame(explode);
}
explode();
}

function createHeartExplosion(){
const count=2000;
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);
const col=new Float32Array(count*3);

for(let i=0;i<count*3;i+=3){
pos[i]=0;pos[i+1]=0;pos[i+2]=0;
col[i]=1;col[i+1]=0;col[i+2]=0;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
geo.setAttribute("color",new THREE.BufferAttribute(col,3));

const mat=new THREE.PointsMaterial({size:0.2,vertexColors:true});
const exp=new THREE.Points(geo,mat);
scene.add(exp);

const velocity=[];
for(let i=0;i<count;i++){
velocity.push({x:(Math.random()-0.5)*0.5,y:(Math.random())*0.6,z:(Math.random()-0.5)*0.5});
}

function explode(){
const arr=exp.geometry.attributes.position.array;
for(let i=0;i<count;i++){
arr[i*3]+=velocity[i].x;
arr[i*3+1]+=velocity[i].y;
arr[i*3+2]+=velocity[i].z;
}
exp.geometry.attributes.position.needsUpdate=true;
requestAnimationFrame(explode);
}
explode();
}

/* ---------------- MODAL LOGIC ---------------- */

const modal=document.getElementById("proposalModal");
const modalText=document.getElementById("modalText");
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const secretBtn=document.getElementById("secretBtn");
const overlayText=document.getElementById("overlayText");

document.getElementById("proposalBtn").onclick=()=>modal.classList.add("active");

/* Holi YES */
yesBtn.onclick=()=>{
playFah();
createColorExplosion();
modalText.innerHTML="Yayyyyy!! 🌈💖<br>You just made this Holi magical! ✨";
yesBtn.style.display="none";
noBtn.style.display="none";
secretBtn.style.display="inline-block";
};

/* Holi NO */
let noClicks=0;
const noMessages=["Are you sure? 🥺","I bought colors 😭","Destiny says YES 😌","You can't escape 😂"];
const bgMessages=["Holi needs YOU 🌸","My colors shine with you 💖","Say yes already 😏","Stop resisting 😜"];

noBtn.onclick=()=>{
modalText.innerHTML=noMessages[noClicks%noMessages.length];
overlayText.innerHTML=bgMessages[noClicks%bgMessages.length];
noClicks++;
noBtn.style.position="absolute";
noBtn.style.top=Math.random()*250+"px";
noBtn.style.left=Math.random()*250+"px";
};

/* Date Stage */
secretBtn.onclick=()=>{
modalText.innerHTML=`
<div id="dateQuestion">
💖 Now that you said YES to Holi...<br><br>
Will you go on a cute date with me too? 🌸✨
</div>
<br>
<button id="dateYesBtn">Yes ❤️</button>
<button id="dateNoBtn">No 😜</button>
`;

secretBtn.style.display="none";

setTimeout(()=>{

const dateYes=document.getElementById("dateYesBtn");
const dateNo=document.getElementById("dateNoBtn");
const dateQuestion=document.getElementById("dateQuestion");

let dateNoClicks=0;
const convincing=["Think again 😏","Come onnn 🥺","You know you want to 😉","I'll bring chocolates 🍫","Last chance 😌"];

dateNo.onclick=()=>{
if(dateNoClicks<convincing.length){
dateQuestion.innerHTML=convincing[dateNoClicks];
dateYes.style.transform=`scale(${1 + dateNoClicks*0.2})`;
dateNo.style.transform=`scale(${1 - dateNoClicks*0.1})`;
dateNoClicks++;
}else{
dateNo.style.position="absolute";
dateNo.style.top=Math.random()*200+"px";
dateNo.style.left=Math.random()*200+"px";
}
};

dateYes.onclick=()=>{
createHeartExplosion();
modalText.innerHTML="💘 BEST DECISION EVER!!! 🌸✨";
};

},100);
};

</script>
</body>
</html>
